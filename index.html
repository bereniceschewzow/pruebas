<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saul Bass</title>
  <link rel="stylesheet" href="estilo.css">
</head>
<body>

<div class="page-wrapper">

  <!-- ── Hero ── -->
  <header class="hero">
    <img src="pregunta.png" alt="pregunta" class="logo">
    <p class="hero-sub">Diseño de vida sin complicaciones</p>
  </header>

  <div class="strip"></div>

  <!-- ── Form ── -->
  <form>

    <div data-num="01">
      <label for="simplicidad">¿Qué tan simple vivís? — 1 = caos total · 10 = zen absoluto</label>
      <div class="range-row">
        <input type="range" id="simplicidad" min="1" max="10" value="5" step="1"
          oninput="document.getElementById('simp-out').textContent = this.value">
        <span class="range-value" id="simp-out">5</span>
      </div>
    </div>

    <div data-num="02">
      <label>¿De qué área es?</label>
      <div id="areas">
        <button type="button" data-val="Trabajo / productividad">Trabajo</button>
        <button type="button" data-val="Tecnología">Tecnología</button>
        <button type="button" data-val="Hogar">Hogar</button>
        <button type="button" data-val="Educación">Educación</button>
        <button type="button" data-val="Salud / bienestar">Salud</button>
        <button type="button" data-val="Finanzas personales">Finanzas</button>
        <button type="button" data-val="Relaciones / social">Social</button>
        <button type="button" data-val="Otro">Otro</button>
      </div>
    </div>

    <div data-num="03">
      <label for="cosa">¿Qué simplificarías?</label>
      <textarea id="cosa" placeholder="..."></textarea>
    </div>

    <div data-num="04">
      <label for="motivo">¿Por qué te parece complicado hoy?</label>
      <textarea id="motivo" placeholder="..."></textarea>
    </div>

    <div data-num="05">
      <label for="urgencia">¿Qué tan urgente es resolverlo? — 1 = puede esperar · 5 = ya mismo</label>
      <div class="range-row">
        <input type="range" id="urgencia" min="1" max="5" value="3" step="1"
          oninput="document.getElementById('urg-out').textContent = this.value">
        <span class="range-value" id="urg-out">3</span>
      </div>
    </div>

    <div>
      <button type="button" id="btn" onclick="enviar()">Enviar</button>
    </div>

    <div id="error-msg" hidden>
      <p id="error-text"></p>
    </div>

  </form>

  <!-- ── Result ── -->
  <div id="result-box" hidden>
    <h2>Respuesta de Claude</h2>
    <div id="result-content"></div>
  </div>

  <!-- ── Year strip footer ── -->
  <div class="year-strip" aria-hidden="true">
    <span>1920</span><span>1936</span><span>1946</span><span>1955</span>
    <span>1958</span><span>1962</span><span>1963</span><span>1980</span>
    <span>1984</span><span>1987</span><span>1991</span><span>1996</span>
  </div>

</div><!-- /.page-wrapper -->

<script>
  let areaSelected = '';

  document.querySelectorAll('#areas button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#areas button').forEach(b => b.removeAttribute('aria-pressed'));
      btn.setAttribute('aria-pressed', 'true');
      areaSelected = btn.dataset.val;
    });
  });

  async function enviar() {
    const cosa     = document.getElementById('cosa').value.trim();
    const motivo   = document.getElementById('motivo').value.trim();
    const urgencia = document.getElementById('urgencia').value;
    const simp     = document.getElementById('simplicidad').value;

    document.getElementById('error-msg').hidden = true;

    if (!cosa) {
      document.getElementById('cosa').focus();
      return;
    }

    const btn = document.getElementById('btn');
    btn.disabled = true;
    btn.textContent = 'Pensando...';
    document.getElementById('result-box').hidden = true;

    const prompt = `Sos un asistente experto en simplificar procesos y tareas cotidianas.

Nivel de simplicidad actual del usuario (1=caos, 10=zen): ${simp}/10
Área: ${areaSelected || 'General'}
¿Qué quiere simplificar?: ${cosa}
¿Por qué es complicado?: ${motivo || 'No especificado.'}
Urgencia (1-5): ${urgencia}/5

Dame exactamente 3 ideas prácticas y concretas para simplificar esto. Para cada idea usá este formato EXACTO:

**IDEA 1: [título breve]**
[2-3 oraciones concretas]

**IDEA 2: [título breve]**
[2-3 oraciones concretas]

**IDEA 3: [título breve]**
[2-3 oraciones concretas]

Respondé en español, sé directo y evitá frases genéricas.`;

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const texto = data.content?.map(b => b.text || '').join('') || '';
      if (!texto) throw new Error('Respuesta vacía');
      renderRespuesta(texto);

    } catch(e) {
      document.getElementById('error-text').textContent = `Error: ${e.message}`;
      document.getElementById('error-msg').hidden = false;
    }

    btn.disabled = false;
    btn.textContent = 'Volver a preguntar';
  }

  function renderRespuesta(texto) {
    const container = document.getElementById('result-content');
    container.innerHTML = '';

    const ideaRegex = /\*\*IDEA\s*(\d+):\s*(.+?)\*\*\s*([\s\S]*?)(?=\*\*IDEA|\s*$)/gi;
    let match, encontradas = 0;

    while ((match = ideaRegex.exec(texto)) !== null) {
      const div = document.createElement('div');
      div.innerHTML = `<strong>Idea ${match[1]}: ${match[2].trim()}</strong><p>${match[3].trim()}</p>`;
      container.appendChild(div);
      encontradas++;
    }

    if (encontradas === 0) {
      container.innerHTML = texto.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
    }

    document.getElementById('result-box').hidden = false;
    document.getElementById('result-box').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
</script>

</body>
</html>
