<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saul Bass</title>
  <link rel="stylesheet" href="estilo.css">
</head>
<body>

<div class="page-wrapper">

  <!-- ── Hero ── -->
  <header class="hero">
    <img src="pregunta.png" alt="pregunta" class="logo">
    <p class="hero-sub">Diseño sin complicaciones</p>
  </header>

  <div class="strip"></div>

  <!-- ── Form ── -->
  <form>

    <div data-num="01">
      <label for="simplicidad">¿Qué tan simple vivís? — 1 = caos total · 10 = zen absoluto</label>
      <div class="range-row">
        <input type="range" id="simplicidad" min="1" max="10" value="5" step="1"
          oninput="document.getElementById('simp-out').textContent = this.value">
        <span class="range-value" id="simp-out">5</span>
      </div>
    </div>

    <div data-num="02">
      <label>¿De qué área es?</label>
      <div id="areas">
        <button type="button" data-val="Trabajo / productividad">Trabajo</button>
        <button type="button" data-val="Tecnología">Tecnología</button>
        <button type="button" data-val="Hogar">Hogar</button>
        <button type="button" data-val="Educación">Educación</button>
        <button type="button" data-val="Salud / bienestar">Salud</button>
        <button type="button" data-val="Finanzas personales">Finanzas</button>
        <button type="button" data-val="Relaciones / social">Social</button>
        <button type="button" data-val="Otro">Otro</button>
      </div>
    </div>

    <div data-num="03">
      <label for="cosa">¿Qué simplificarías?</label>
      <textarea id="cosa" placeholder="..."></textarea>
    </div>

    <div data-num="04">
      <label for="motivo">¿Por qué te parece complicado hoy?</label>
      <textarea id="motivo" placeholder="..."></textarea>
    </div>

    <div data-num="05">
      <label for="urgencia">¿Qué tan urgente es resolverlo? — 1 = puede esperar · 5 = ya mismo</label>
      <div class="range-row">
        <input type="range" id="urgencia" min="1" max="5" value="3" step="1"
          oninput="document.getElementById('urg-out').textContent = this.value">
        <span class="range-value" id="urg-out">3</span>
      </div>
    </div>

    <div>
      <button type="button" id="btn" onclick="enviar()">Enviar</button>
    </div>

  </form>

  <!-- ── Result ── -->
  <div id="result-box" hidden>
    <h2>¡Respuesta enviada!</h2>
  </div>

</div><!-- /.page-wrapper -->

<script>
  let areaSelected = '';

  document.querySelectorAll('#areas button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#areas button').forEach(b => b.removeAttribute('aria-pressed'));
      btn.setAttribute('aria-pressed', 'true');
      areaSelected = btn.dataset.val;
    });
  });

  function enviar() {
    const cosa = document.getElementById('cosa').value.trim();

    if (!cosa) {
      document.getElementById('cosa').focus();
      return;
    }

    document.getElementById('result-box').hidden = false;
    document.getElementById('result-box').scrollIntoView({ behavior: 'smooth', block: 'start' });

    const btn = document.getElementById('btn');
    btn.textContent = 'Volver a enviar';
  }
</script>

</body>
</html>
